# ==========================================
# [ SHARED LOGIC ]
# Fungsi Global Backend / Core Functions
# ==========================================

track_path() {
    local path_to_track="$1"
    if [ -n "$path_to_track" ]; then
        echo "$path_to_track" >> /etc/owasp-lab-manifest.txt
    fi
}

inject_db_creds() {
    local user="$1"
    local pass="$2"
    local hack_dir="/var/www/hack"
    
    # 1. Inject DVWA Credentials
    local file_dvwa="$hack_dir/${APP_DIR[dvwa]}/config/config.inc.php"
    if [ -f "$file_dvwa" ]; then
        sed -i "s/\$_DVWA\[ 'db_user' \].*/\$_DVWA\[ 'db_user' \] = '${user}';/g" "$file_dvwa"
        sed -i "s/\$_DVWA\[ 'db_password' \].*/\$_DVWA\[ 'db_password' \] = '${pass}';/g" "$file_dvwa"
    fi
    
    # 2. Inject bWAPP Credentials
    local file_bwapp="$hack_dir/${APP_DIR[bwapp]}/bWAPP/admin/settings.php"
    if [ -f "$file_bwapp" ]; then
        sed -i "s/\$db_username =.*/\$db_username = \"${user}\";/g" "$file_bwapp"
        sed -i "s/\$db_password =.*/\$db_password = \"${pass}\";/g" "$file_bwapp"
    fi
    
    # 3. Inject XVWA Credentials
    local file_xvwa="$hack_dir/${APP_DIR[xvwa]}/config.php"
    if [ -f "$file_xvwa" ]; then
        sed -i "s/\$user =.*/\$user = '${user}';/g" "$file_xvwa"
        sed -i "s/\$pass =.*/\$pass = '${pass}';/g" "$file_xvwa"
    fi
    
    # 4. Inject Mutillidae Credentials
    local file_mut="$hack_dir/${APP_DIR[mutillidae]}/src/includes/database-config.inc"
    if [ -f "$file_mut" ]; then
        sed -i "s/define('DB_USERNAME'.*/define('DB_USERNAME', '${user}');/g" "$file_mut"
        sed -i "s/define('DB_PASSWORD'.*/define('DB_PASSWORD', '${pass}');/g" "$file_mut"
        sed -i "s/define('DB_HOST'.*/define('DB_HOST', '127.0.0.1');/g" "$file_mut"
    fi
    
    # 5. Inject VWA Credentials
    local dir_vwa="$hack_dir/${APP_DIR[vwa]}"
    if [ -d "$dir_vwa" ]; then
        find "$dir_vwa" -type f -name "*.php" -exec sed -i "s/\$dbuser = 'root';/\$dbuser = '${user}';/g" {} +
        find "$dir_vwa" -type f -name "*.php" -exec sed -i "s/\$dbpass = '';/\$dbpass = '${pass}';/g" {} +
        find "$dir_vwa" -type f -name "*.php" -exec sed -i "s/\$username = \"root\";/\$username = \"${user}\";/g" {} +
        find "$dir_vwa" -type f -name "*.php" -exec sed -i "s/\$password = \"\";/\$password = \"${pass}\";/g" {} +
    fi
}

# ==========================================
# [ UI COMPONENTS ]
# Tampilan Terminal / Terminal Interface
# ==========================================

# Terminal Colors
BLK='\033[0;30m'
WHT='\033[1;37m'
RED='\033[1;31m'
GRN='\033[1;32m'
YLW='\033[1;33m'
BLU='\033[1;34m'
MAG='\033[1;35m'
CYN='\033[1;36m'

REDBG='\033[41m'
BLKBG='\033[40m'
DRK='\033[0;31m'
DIM='\033[2;33m'

RST='\033[0m'

_hdr() {
    echo -e "\n${DIM}  ┄┄ $1 ┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄${RST}"
}

_tp() {
    echo -e "  $1"
}

_prmpt() {
    echo -ne "  $1"
}

ask_config() {
    local var_name="$1"
    local prompt="$2"
    local default_val="$3"
    local is_hidden="$4"
    
    _prmpt "${WHT}${prompt} [${default_val}]: ${RST}"
    
    local val=""
    if [ "$is_hidden" == "1" ]; then
        read -s val
        echo ""
    else
        read val
    fi
    
    local final_val="${val:-$default_val}"
    
    # Export explicitly
    eval "$var_name=\"$final_val\""
    
    # Save to config file
    if [ -n "$CONFIG_FILE" ]; then
        echo "$var_name=\"$final_val\"" >> "$CONFIG_FILE"
    fi
}

_run() {
    local label="$1"
    shift
    
    # Execute command in background and log
    eval "$@" >> "owasp-lab.log" 2>&1 &
    local pid=$!
    
    # Animation Spinner
    local spin='-\|/'
    local i=0
    
    tput civis
    while kill -0 $pid 2>/dev/null; do
        i=$(( (i+1) %4 ))
        local last_line=$(tail -n 1 "owasp-lab.log" 2>/dev/null | tr -d '\r\n' | cut -c1-50)
        printf "\r\033[K  ${CYN}[ %s ]${RST} %-40s ${DIM} %-50s${RST}" "${spin:$i:1}" "$label" "$last_line"
        sleep 0.1
    done
    
    wait $pid
    local exit_code=$?
    tput cnorm
    
    if [ $exit_code -eq 0 ]; then
        printf "\r\033[K  ${GRN}[ ✓ ]${RST} %s\n" "$label"
    else
        printf "\r\033[K  ${RED}[ ✗ ]${RST} %s (FAILED)\n" "$label"
        exit 1
    fi
}


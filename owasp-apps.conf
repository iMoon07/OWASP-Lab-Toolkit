APPS_LIST=()
declare -A APP_PORT APP_ENGINE APP_DIR APP_DOCROOT APP_URI APP_CREDS_USER APP_CREDS_PASS APP_URL APP_DISPLAY_NAME

# -----------------------------------------
# [ APP REGISTRY ]
# Mendaftarkan Web & Port / Register Apps
# -----------------------------------------

register_app() {
    local name="$1"
    
    APPS_LIST+=("$name")
    APP_PORT["$name"]="$2"
    APP_ENGINE["$name"]="$3"
    APP_DIR["$name"]="$4"
    APP_DOCROOT["$name"]="$5"
    APP_URI["$name"]="$6"
    APP_CREDS_USER["$name"]="$7"
    APP_CREDS_PASS["$name"]="$8"
    APP_URL["$name"]="$9"
    APP_DISPLAY_NAME["$name"]="${10}"
}

